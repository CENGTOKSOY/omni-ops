name: Omni-Ops CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Sadece main branch'ine push yapınca çalışır

jobs:
  build-and-deploy:
    runs-on: self-hosted # Senin MacBook'unu çağırıyoruz
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Docker Hub kullanıcı adını ve repo adını kontrol et
          tags: ${{ secrets.DOCKER_USERNAME }}/omni-ops-order-api:latest

      - name: Deploy to Minikube
        run: |
          # Kubernetes deployment'ını güncelle ve yeni imajı çekmesini sağla
          kubectl rollout restart deployment order-api
          echo "Deployment başarıyla güncellendi!"