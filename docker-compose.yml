version: '3.8'

services:
  localstack:
    container_name: omni-ops-localstack
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # Servis portları
    environment:
      - SERVICES=s3,sqs,dynamodb        # Sadece ihtiyacımız olanları açıyoruz
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"