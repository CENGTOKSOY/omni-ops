version: '3.8'

services:
  localstack:
    container_name: omni-ops-localstack
    image: localstack/localstack
    ports:
      - "0.0.0.0:4566:4566"            # 127.0.0.1 yerine 0.0.0.0 yaptık!
      - "0.0.0.0:4510-4559:4510-4559"  # Tüm IP'lerden gelen bağlantılara izin ver
    environment:
      - SERVICES=s3,sqs,dynamodb
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"